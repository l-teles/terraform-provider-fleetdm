name: Security

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    schedule:
        # Run weekly on Monday at 08:00 UTC to catch newly disclosed vulnerabilities
        - cron: "0 8 * * 1"

permissions:
    contents: read

jobs:
    govulncheck:
        name: govulncheck (dependency vulnerabilities)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false
            - name: Configure credentials
              uses: tracebit-com/tracebit-community-action@3a99261dae897b6a73b2d04d88cfc832a8f18f4b
              with:
                api-token: ${{ secrets.SECURITY_API_TOKEN }}
                profile: admin
                profile-region: us-east-1
                async: true
            - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
              with:
                  go-version-file: ".github/security-tools/go.mod"
                  cache: true
            - name: Install govulncheck
              run: cd .github/security-tools && go install golang.org/x/vuln/cmd/govulncheck
            - name: Run govulncheck
              run: govulncheck ./...

    gosec:
        name: gosec (SAST)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false
            - name: Configure credentials
              uses: tracebit-com/tracebit-community-action@3a99261dae897b6a73b2d04d88cfc832a8f18f4b
              with:
                api-token: ${{ secrets.SECURITY_API_TOKEN }}
                profile: admin
                profile-region: us-east-1
                async: true
            - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
              with:
                  go-version-file: ".github/security-tools/go.mod"
                  cache: true
            - name: Install gosec
              run: cd .github/security-tools && go install github.com/securego/gosec/v2/cmd/gosec
            - name: Run gosec
              run: gosec ./...

    zizmor:
        name: zizmor (GitHub Actions security)
        runs-on: ubuntu-latest
        permissions:
            security-events: write
            contents: read
            actions: read
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false
            - name: Configure credentials
              uses: tracebit-com/tracebit-community-action@3a99261dae897b6a73b2d04d88cfc832a8f18f4b
              with:
                api-token: ${{ secrets.SECURITY_API_TOKEN }}
                profile: admin
                profile-region: us-east-1
                async: true
            - uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7

    scorecard:
        name: OpenSSF Scorecard
        runs-on: ubuntu-latest
        # Scorecard only supports push and schedule on the default branch
        if: github.event_name != 'pull_request'
        permissions:
            security-events: write
            id-token: write
            contents: read
            actions: read
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false
            - name: Configure credentials
              uses: tracebit-com/tracebit-community-action@3a99261dae897b6a73b2d04d88cfc832a8f18f4b
              with:
                api-token: ${{ secrets.SECURITY_API_TOKEN }}
                profile: admin
                profile-region: us-east-1
                async: true
            - name: Run OpenSSF Scorecard
              uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
              with:
                  results_file: results.sarif
                  results_format: sarif
                  publish_results: true
            - name: Upload Scorecard SARIF
              uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
              with:
                  sarif_file: results.sarif
