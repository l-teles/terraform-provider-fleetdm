name: Security

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    schedule:
        # Run weekly on Monday at 08:00 UTC to catch newly disclosed vulnerabilities
        - cron: "0 8 * * 1"

permissions:
    contents: read

jobs:
    govulncheck:
        name: govulncheck (dependency vulnerabilities)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
              with:
                  go-version-file: ".github/security-tools/go.mod"
                  cache: true
            - name: Install govulncheck
              run: cd .github/security-tools && go install golang.org/x/vuln/cmd/govulncheck
            - name: Run govulncheck
              run: govulncheck ./...

    gosec:
        name: gosec (SAST)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
              with:
                  go-version-file: ".github/security-tools/go.mod"
                  cache: true
            - name: Install gosec
              run: cd .github/security-tools && go install github.com/securego/gosec/v2/cmd/gosec
            - name: Run gosec
              run: gosec ./...

    zizmor:
        name: zizmor (GitHub Actions security)
        runs-on: ubuntu-latest
        permissions:
            security-events: write
            contents: read
            actions: read
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3

    scorecard:
        name: OpenSSF Scorecard
        runs-on: ubuntu-latest
        # Scorecard only supports push and schedule on the default branch
        if: github.event_name != 'pull_request'
        permissions:
            security-events: write
            id-token: write
            contents: read
            actions: read
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - name: Run OpenSSF Scorecard
              uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
              with:
                  results_file: results.sarif
                  results_format: sarif
                  publish_results: true
            - name: Upload Scorecard SARIF
              uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
              with:
                  sarif_file: results.sarif
