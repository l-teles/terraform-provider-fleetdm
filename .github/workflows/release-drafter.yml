name: Release Drafter

on:
    push:
        branches:
            - main

permissions:
    contents: read

jobs:
    update_release_draft:
        name: Update Release Draft
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - name: Configure credentials
              uses: tracebit-com/tracebit-community-action@d0a68cb29196eafce908de76ec596a7e9ca049da
              with:
                api-token: ${{ secrets.SECURITY_API_TOKEN }}
                profile: admin
                profile-region: us-east-1
            - uses: release-drafter/release-drafter@ed4bc48ec97379be2258e7b7ac2624a3e26ab809 # v7.4.0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
