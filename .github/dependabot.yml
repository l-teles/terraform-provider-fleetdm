version: 2
updates:
    - package-ecosystem: gomod
      directory: /
      schedule:
          interval: weekly
      target-branch: main
      commit-message:
          prefix: "deps:"
      open-pull-requests-limit: 10
      labels:
          - dependencies
      # Group minor + patch bumps into a single PR; major bumps are left
      # ungrouped so each arrives as its own PR for individual review.
      groups:
          go-dependencies:
              patterns:
                  - "*"
              update-types:
                  - "minor"
                  - "patch"
      cooldown:
          default-days: 7

    - package-ecosystem: gomod
      directory: /.github/security-tools
      schedule:
          interval: weekly
      target-branch: main
      commit-message:
          prefix: "ci:"
      open-pull-requests-limit: 5
      labels:
          - chore
          - dependencies
      groups:
          security-tools:
              patterns:
                  - "*"
              update-types:
                  - "minor"
                  - "patch"
      cooldown:
          default-days: 7

    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: weekly
      target-branch: main
      commit-message:
          prefix: "ci:"
      open-pull-requests-limit: 5
      labels:
          - chore
      groups:
          github-actions:
              patterns:
                  - "*"
              update-types:
                  - "minor"
                  - "patch"
      cooldown:
          default-days: 7
