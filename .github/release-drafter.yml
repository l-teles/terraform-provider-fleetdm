name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
    - title: "🚀 Features"
      labels:
          - "enhancement"
          - "feature"
    - title: "🐛 Bug Fixes"
      labels:
          - "bug"
          - "fix"
    - title: "📝 Documentation"
      labels:
          - "documentation"
    - title: "🧰 Maintenance"
      labels:
          - "chore"
          - "dependencies"

change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'

version-resolver:
    major:
        labels:
            - "major"
            - "breaking-change"
    minor:
        labels:
            - "minor"
            - "enhancement"
            - "feature"
    patch:
        labels:
            - "patch"
            - "bug"
            - "fix"
            - "documentation"
            - "dependencies"
    default: patch

template: |
    ## Changes

    $CHANGES
